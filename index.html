<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신약 신청 관리 시스템 2026 (전체표시)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
        /* 긴 텍스트 처리를 위한 스타일 */
        .reason-cell { min-width: 250px; max-width: 400px; white-space: normal; word-break: break-all; }
        .data-table th { white-space: nowrap; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen p-4 md:p-8 text-slate-800">

    <div class="max-w-[1600px] mx-auto space-y-6">
        <div class="bg-white shadow-md rounded-xl border border-slate-200 overflow-hidden">
            <div class="bg-indigo-600 p-4 text-white font-bold flex justify-between items-center">
                <span>💊 신규 접수 및 수정 (2026 상반기)</span>
                <button onclick="resetForm()" class="text-xs bg-indigo-500 hover:bg-indigo-400 px-3 py-1 rounded transition">새 양식으로 초기화</button>
            </div>
            <form id="drugForm" class="p-6 grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="hidden" id="docId">
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">제품명</label>
                    <input type="text" id="productName" required class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">함량(용량)</label>
                    <input type="text" id="dosage" required class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">성분명</label>
                    <input type="text" id="ingredient" required class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">제약회사</label>
                    <input type="text" id="company" required class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">보험구분</label>
                    <select id="insurance" class="w-full border p-2 rounded bg-white outline-none focus:ring-2 focus:ring-indigo-500">
                        <option value="보험">보험</option>
                        <option value="비보험">비보험</option>
                    </select>
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">신청의료인</label>
                    <input type="text" id="applicant" required class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">기존약 (대체)</label>
                    <input type="text" id="existingDrug" class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-bold text-slate-500">기존약 제약사</label>
                    <input type="text" id="existingCompany" class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div class="md:col-span-4 space-y-1">
                    <label class="text-xs font-bold text-slate-500">변경 및 신청 사유</label>
                    <textarea id="reason" rows="3" required class="w-full border p-2 rounded focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="신규 도입이 필요한 학술적/임상적 사유를 적어주세요."></textarea>
                </div>
                <button type="submit" id="submitBtn" class="md:col-span-4 bg-indigo-600 text-white font-bold py-3 rounded-lg hover:bg-indigo-700 transition shadow-lg text-lg">데이터 저장하기</button>
            </form>
        </div>

        <div class="bg-white shadow-md rounded-xl border border-slate-200 overflow-hidden">
            <div class="bg-slate-800 p-4 text-white flex justify-between items-center">
                <h2 class="font-bold flex items-center gap-2">
                    📋 실시간 전체 접수 현황 
                    <span id="countBadge" class="bg-indigo-500 text-[10px] px-2 py-0.5 rounded-full">0건</span>
                </h2>
                <span class="text-xs opacity-60 italic">자동 실시간 업데이트 중</span>
            </div>
            <div class="overflow-x-auto">
                <table class="w-full text-left text-[13px] border-collapse data-table">
                    <thead>
                        <tr class="bg-slate-100 border-b border-slate-200">
                            <th class="p-3 font-bold">제품명</th>
                            <th class="p-3 font-bold">함량</th>
                            <th class="p-3 font-bold">성분명</th>
                            <th class="p-3 font-bold">제약사</th>
                            <th class="p-3 font-bold">보험</th>
                            <th class="p-3 font-bold">신청인</th>
                            <th class="p-3 font-bold">기존약(제약사)</th>
                            <th class="p-3 font-bold">신청사유</th>
                            <th class="p-3 font-bold text-center">관리</th>
                        </tr>
                    </thead>
                    <tbody id="listBody" class="divide-y divide-slate-100">
                        <tr><td colspan="9" class="p-10 text-center text-slate-400">데이터를 동기화 중입니다...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, updateDoc, deleteDoc, doc, query, orderBy, onSnapshot, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCkWnacJS_3U3sYrDeLv4BvrI73hLiKv5k",
            authDomain: "new-drug-applications.firebaseapp.com",
            projectId: "new-drug-applications",
            storageBucket: "new-drug-applications.firebasestorage.app",
            messagingSenderId: "582639560208",
            appId: "1:582639560208:web:fbb0482c7721f0beddcc95"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const colRef = collection(db, "submissions_2026");

        // [1] 실시간 리스트 출력 (모든 항목 포함)
        const q = query(colRef, orderBy("createdAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const listBody = document.getElementById('listBody');
            const countBadge = document.getElementById('countBadge');
            let html = "";
            snapshot.forEach((document) => {
                const data = document.data();
                const id = document.id;
                html += `
                    <tr class="hover:bg-indigo-50/50 transition border-b border-slate-50">
                        <td class="p-3 font-bold text-slate-900">${data.productName}</td>
                        <td class="p-3 text-slate-600">${data.dosage}</td>
                        <td class="p-3 text-slate-600">${data.ingredient}</td>
                        <td class="p-3 text-slate-500">${data.company}</td>
                        <td class="p-3 text-center">
                            <span class="px-2 py-0.5 rounded text-[11px] font-bold ${data.insurance === '보험' ? 'bg-green-100 text-green-700' : 'bg-amber-100 text-amber-700'}">${data.insurance}</span>
                        </td>
                        <td class="p-3 font-semibold text-indigo-700">${data.applicant}</td>
                        <td class="p-3 text-slate-500 italic">${data.existingDrug || '-'}<br><small>${data.existingCompany || '-'}</small></td>
                        <td class="p-3 reason-cell text-slate-600 text-xs leading-relaxed">${data.reason}</td>
                        <td class="p-3 text-center space-x-2 whitespace-nowrap">
                            <button onclick="editData('${id}', ${JSON.stringify(data).replace(/"/g, '&quot;')})" class="bg-blue-50 text-blue-600 px-2 py-1 rounded border border-blue-200 hover:bg-blue-600 hover:text-white transition">수정</button>
                            <button onclick="deleteData('${id}')" class="bg-red-50 text-red-600 px-2 py-1 rounded border border-red-200 hover:bg-red-600 hover:text-white transition">삭제</button>
                        </td>
                    </tr>
                `;
            });
            listBody.innerHTML = html || '<tr><td colspan="9" class="p-10 text-center text-slate-400">등록된 신청 내역이 없습니다.</td></tr>';
            countBadge.innerText = `${snapshot.size}건`;
        });

        // [2] 저장/수정 로직
        document.getElementById('drugForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const docId = document.getElementById('docId').value;
            
            const payload = {
                productName: document.getElementById('productName').value,
                dosage: document.getElementById('dosage').value,
                ingredient: document.getElementById('ingredient').value,
                company: document.getElementById('company').value,
                insurance: document.getElementById('insurance').value,
                applicant: document.getElementById('applicant').value,
                existingDrug: document.getElementById('existingDrug').value,
                existingCompany: document.getElementById('existingCompany').value,
                reason: document.getElementById('reason').value,
                updatedAt: serverTimestamp()
            };

            btn.disabled = true;
            try {
                if (docId) {
                    await updateDoc(doc(db, "submissions_2026", docId), payload);
                    alert("성공적으로 수정되었습니다.");
                } else {
                    payload.createdAt = serverTimestamp();
                    await addDoc(colRef, payload);
                    alert("성공적으로 접수되었습니다.");
                }
                resetForm();
            } catch (err) { alert("처리 중 오류 발생: " + err.message); }
            btn.disabled = false;
        });

        // 전역 함수 등록 (수정/삭제/리셋)
        window.deleteData = async (id) => {
            if (confirm("⚠️ 해당 신청 정보를 영구히 삭제하시겠습니까?")) {
                await deleteDoc(doc(db, "submissions_2026", id));
            }
        };

        window.editData = (id, data) => {
            document.getElementById('docId').value = id;
            document.getElementById('productName').value = data.productName;
            document.getElementById('dosage').value = data.dosage;
            document.getElementById('ingredient').value = data.ingredient;
            document.getElementById('company').value = data.company;
            document.getElementById('insurance').value = data.insurance;
            document.getElementById('applicant').value = data.applicant;
            document.getElementById('existingDrug').value = data.existingDrug || '';
            document.getElementById('existingCompany').value = data.existingCompany || '';
            document.getElementById('reason').value = data.reason;
            document.getElementById('submitBtn').innerText = "내용 업데이트(수정) 하기";
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };

        window.resetForm = () => {
            document.getElementById('drugForm').reset();
            document.getElementById('docId').value = "";
            document.getElementById('submitBtn').innerText = "데이터 저장하기";
        };
    </script>
</body>
</html>
