<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신약 신청 시스템 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-100 min-h-screen p-4 md:p-8">

    <div class="max-w-3xl mx-auto bg-white rounded-xl shadow-md border border-slate-200 overflow-hidden">
        <div class="bg-indigo-700 p-6">
            <h1 class="text-white text-xl font-bold tracking-tight">신약 신청서 (2026 상반기)</h1>
            <p class="text-indigo-100 text-sm mt-1">GitHub & Firebase 실시간 연동 모듈</p>
        </div>

        <form id="applicationForm" class="p-6 space-y-4">
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">제품명</label>
                    <input type="text" id="productName" required class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">함량(용량)</label>
                    <input type="text" id="dosage" required class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">성분명</label>
                    <input type="text" id="ingredient" required class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">제약회사</label>
                    <input type="text" id="company" required class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">보험/비보험</label>
                    <select id="insurance" class="w-full border rounded p-2 bg-white">
                        <option value="보험">보험</option>
                        <option value="비보험">비보험</option>
                    </select>
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">신청의료인</label>
                    <input type="text" id="applicant" required class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">기존약 (대체대상)</label>
                    <input type="text" id="existingDrug" class="w-full border rounded p-2">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">기존약 제약회사</label>
                    <input type="text" id="existingCompany" class="w-full border rounded p-2">
                </div>
            </div>

            <div class="pt-2">
                <label class="block text-xs font-semibold text-slate-500 uppercase mb-1">변경 사유</label>
                <textarea id="reason" rows="3" required class="w-full border rounded p-2 focus:ring-2 focus:ring-indigo-500 outline-none"></textarea>
            </div>

            <button type="submit" id="submitBtn" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-3 rounded-lg transition duration-200">
                신청서 서버 전송
            </button>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 제공해주신 Config 적용
        const firebaseConfig = {
            apiKey: "AIzaSyCkWnacJS_3U3sYrDeLv4BvrI73hLiKv5k",
            authDomain: "new-drug-applications.firebaseapp.com",
            projectId: "new-drug-applications",
            storageBucket: "new-drug-applications.firebasestorage.app",
            messagingSenderId: "582639560208",
            appId: "1:582639560208:web:fbb0482c7721f0beddcc95"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        document.getElementById('applicationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '처리 중...';

            try {
                await addDoc(collection(db, "submissions_2026"), {
                    productName: document.getElementById('productName').value,
                    dosage: document.getElementById('dosage').value,
                    ingredient: document.getElementById('ingredient').value,
                    company: document.getElementById('company').value,
                    insurance: document.getElementById('insurance').value,
                    applicant: document.getElementById('applicant').value,
                    existingDrug: document.getElementById('existingDrug').value,
                    existingCompany: document.getElementById('existingCompany').value,
                    reason: document.getElementById('reason').value,
                    timestamp: serverTimestamp()
                });
                alert("신청서가 성공적으로 저장되었습니다.");
                e.target.reset();
            } catch (err) {
                console.error(err);
                alert("저장 실패: Firebase 규칙(Rules)을 확인하세요.");
            } finally {
                btn.disabled = false;
                btn.innerHTML = '신청서 서버 전송';
            }
        });
    </script>
</body>
</html>
