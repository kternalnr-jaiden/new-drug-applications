<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>신약 신청 시스템 2026</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Pretendard:wght@400;600;700&display=swap');
        body { font-family: 'Pretendard', sans-serif; }
    </style>
</head>
<body class="bg-gray-100 min-h-screen flex items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white shadow-2xl rounded-2xl overflow-hidden">
        <div class="bg-blue-700 p-8 text-white text-center">
            <h1 class="text-3xl font-bold">신약 신청서 (2026 상반기)</h1>
            <p class="mt-2 text-blue-100 opacity-90">내용을 입력하신 후 전송 버튼을 눌러주세요.</p>
        </div>

        <form id="applicationForm" class="p-8 grid grid-cols-1 md:grid-cols-2 gap-5">
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">제품명</label>
                <input type="text" id="productName" required class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">함량(용량)</label>
                <input type="text" id="dosage" required class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">성분명</label>
                <input type="text" id="ingredient" required class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">제약회사</label>
                <input type="text" id="company" required class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">보험/비보험</label>
                <select id="insurance" class="w-full border-2 border-gray-200 rounded-lg p-3 bg-white outline-none">
                    <option value="보험">보험</option>
                    <option value="비보험">비보험</option>
                </select>
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">신청의료인</label>
                <input type="text" id="applicant" required class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">기존약 (대체대상)</label>
                <input type="text" id="existingDrug" class="w-full border-2 border-gray-200 rounded-lg p-3">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-600 mb-1">기존약 제약회사</label>
                <input type="text" id="existingCompany" class="w-full border-2 border-gray-200 rounded-lg p-3">
            </div>
            <div class="md:col-span-2">
                <label class="block text-sm font-semibold text-gray-600 mb-1">변경 사유</label>
                <textarea id="reason" rows="4" required class="w-full border-2 border-gray-200 rounded-lg p-3 focus:border-blue-500 outline-none transition" placeholder="신규 도입 사유를 상세히 입력해 주세요."></textarea>
            </div>

            <div class="md:col-span-2 pt-4">
                <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-800 text-white font-bold py-4 rounded-xl shadow-lg transition duration-200 text-lg">
                    신청서 서버 전송
                </button>
            </div>
        </form>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, addDoc, collection, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        // 사용자님의 Firebase 설정
        const firebaseConfig = {
            apiKey: "AIzaSyCkWnacJS_3U3sYrDeLv4BvrI73hLiKv5k",
            authDomain: "new-drug-applications.firebaseapp.com",
            projectId: "new-drug-applications",
            storageBucket: "new-drug-applications.firebasestorage.app",
            messagingSenderId: "582639560208",
            appId: "1:582639560208:web:fbb0482c7721f0beddcc95"
        };

        // 초기화
        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // 제출 이벤트 처리
        document.getElementById('applicationForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            
            // 전송 중 버튼 비활성화
            btn.disabled = true;
            btn.innerHTML = `
                <svg class="animate-spin h-5 w-5 mr-3 border-4 border-white border-t-transparent rounded-full inline-block" viewBox="0 0 24 24"></svg>
                서버 전송 중...
            `;

            try {
                // Firestore의 'submissions_2026' 컬렉션에 데이터 저장
                await addDoc(collection(db, "submissions_2026"), {
                    productName: document.getElementById('productName').value,
                    dosage: document.getElementById('dosage').value,
                    ingredient: document.getElementById('ingredient').value,
                    company: document.getElementById('company').value,
                    insurance: document.getElementById('insurance').value,
                    applicant: document.getElementById('applicant').value,
                    existingDrug: document.getElementById('existingDrug').value,
                    existingCompany: document.getElementById('existingCompany').value,
                    reason: document.getElementById('reason').value,
                    createdAt: serverTimestamp()
                });

                alert("✅ 신청서가 성공적으로 서버에 저장되었습니다!");
                e.target.reset(); // 입력창 초기화
            } catch (error) {
                console.error("Error:", error);
                alert("❌ 전송 실패! Firebase Console에서 Rules(규칙)을 허용해 주세요.");
            } finally {
                btn.disabled = false;
                btn.innerText = "신청서 서버 전송";
            }
        });
    </script>
</body>
</html>
